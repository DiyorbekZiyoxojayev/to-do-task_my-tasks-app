<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskVault Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=DM+Serif+Display&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08080f;--bg2:#0f0f1a;--card:#141420;--card2:#1c1c2a;
  --border:#252535;--border2:#32324a;
  --acc:#7c3aed;--accl:#9d5df0;--acc2:#06b6d4;--acc3:#f472b6;
  --text:#eeeef5;--text2:#9090a8;--muted:#55556a;
  --high:#f43f5e;--med:#fb923c;--low:#34d399;--coin:#e2b714;
  --sw:240px;
}
.light{
  --bg:#f0f0f8;--bg2:#e4e4f0;--card:#fff;--card2:#f5f4fc;
  --border:#dddcec;--border2:#c8c7e0;
  --text:#1a1a2e;--text2:#55557a;--muted:#9090aa;
}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
.blob{position:fixed;border-radius:50%;filter:blur(100px);opacity:.07;pointer-events:none;z-index:0}
.light .blob{opacity:.04}
.b1{width:500px;height:500px;background:var(--acc);top:-100px;right:-80px;animation:da 14s ease-in-out infinite}
.b2{width:400px;height:400px;background:var(--acc2);bottom:-80px;left:-60px;animation:db 18s ease-in-out infinite}
@keyframes da{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,30px)}}
@keyframes db{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-15px)}}

/* AUTH */
#auth-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;position:relative;z-index:1}
.acard{background:linear-gradient(145deg,var(--card),var(--card2));border:1px solid var(--border2);border-radius:24px;padding:40px 32px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.25);position:relative;overflow:hidden}
.acard::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(124,58,237,.06);pointer-events:none}
.alogo{font-family:'DM Serif Display',serif;font-size:34px;letter-spacing:-.5px;margin-bottom:4px}
.alogo span{color:var(--accl);font-style:italic}
.asub{color:var(--muted);font-size:13px;margin-bottom:28px;font-weight:500;line-height:1.5}
.atabs{display:flex;background:var(--bg2);border-radius:12px;padding:4px;margin-bottom:20px;gap:4px}
.atab{flex:1;padding:10px;text-align:center;cursor:pointer;border-radius:9px;font-size:14px;font-weight:600;color:var(--muted);transition:.25s;user-select:none}
.atab.on{background:var(--acc);color:#fff;box-shadow:0 4px 16px rgba(124,58,237,.3)}
.lbl{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px}
.inp{width:100%;background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:12px 14px;border-radius:11px;font-size:15px;outline:none;margin-bottom:12px;font-family:inherit;transition:.2s}
.inp:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(124,58,237,.12)}
.aerr{background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.25);color:#fb7185;padding:10px 14px;border-radius:9px;font-size:13px;margin-bottom:12px;display:none}
.ahint{background:rgba(6,182,212,.07);border:1px solid rgba(6,182,212,.2);color:var(--acc2);padding:10px 14px;border-radius:9px;font-size:12px;margin-bottom:12px;text-align:center;display:none}
.abtn{width:100%;padding:13px;background:var(--acc);color:#fff;font-size:15px;font-weight:700;border:none;border-radius:11px;cursor:pointer;transition:.2s;font-family:'Space Grotesk',sans-serif;letter-spacing:.3px}
.abtn:hover{background:var(--accl);transform:translateY(-1px);box-shadow:0 8px 24px rgba(124,58,237,.3)}

/* LAYOUT */
#app-page{display:none;min-height:100vh;position:relative;z-index:1}
.sidebar{width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;z-index:100;display:flex;flex-direction:column;transition:transform .3s}
.slogo{padding:20px 18px 14px;border-bottom:1px solid var(--border)}
.slogo h2{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;letter-spacing:-1px}
.slogo h2 span{color:var(--accl)}
.slogo p{font-size:11px;color:var(--muted);margin-top:3px;font-weight:500}
.suser{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:rgba(124,58,237,.04);border-left:3px solid var(--acc)}
.savatar{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;flex-shrink:0}
.sname{font-weight:700;font-size:14px}
.scoins{font-family:'Fira Code',monospace;font-size:11px;color:var(--coin);margin-top:1px}
.snav{flex:1;padding:10px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:11px;cursor:pointer;transition:.2s;color:var(--text2);font-weight:600;font-size:14px;border:1px solid transparent;user-select:none}
.ni:hover{background:var(--card);color:var(--text)}
.ni.on{background:rgba(124,58,237,.12);color:var(--accl);border-color:rgba(124,58,237,.18)}
.ni-ico{width:24px;height:24px;background:rgba(124,58,237,.1);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ni.on .ni-ico{background:rgba(124,58,237,.25)}
.nbadge{margin-left:auto;background:var(--high);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:50px;font-family:'Fira Code',monospace}
.sfooter{padding:10px 8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.theme-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:10px;background:var(--card);border:1px solid var(--border)}
.theme-lbl{font-size:13px;font-weight:600;color:var(--text2)}
.tog{width:40px;height:22px;background:var(--border2);border-radius:50px;cursor:pointer;position:relative;transition:.25s;border:none;flex-shrink:0}
.tog.on{background:var(--acc)}
.tog::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.25s}
.tog.on::after{left:21px}
.out-btn{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:inherit;font-size:13px;font-weight:600;transition:.2s;width:100%}
.out-btn:hover{border-color:var(--high);color:var(--high)}

/* TOPBAR */
.topbar{display:none;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.menu-btn{background:transparent;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:2px 6px}
.tlogo{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700}
.tlogo span{color:var(--accl)}
.tcoins{font-family:'Fira Code',monospace;font-size:12px;color:var(--coin);background:rgba(226,183,20,.1);border:1px solid rgba(226,183,20,.2);padding:5px 12px;border-radius:50px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:90;backdrop-filter:blur(2px)}
.overlay.on{display:block}

/* CONTENT */
.mcontent{margin-left:var(--sw);min-height:100vh;display:flex;flex-direction:column}
.page{padding:24px 28px;max-width:900px;display:none;width:100%;animation:fadeIn .2s ease}
.page.on{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.ptitle{font-size:26px;font-weight:800;margin-bottom:6px;letter-spacing:-.5px}
#page-tasks .ptitle{font-family:'DM Serif Display',serif;font-size:28px}
#page-pomodoro .ptitle{font-family:'Space Grotesk',sans-serif;font-size:26px}
#page-analytics .ptitle{font-family:'Plus Jakarta Sans',sans-serif;font-size:26px}
#page-calendar .ptitle{font-family:'DM Serif Display',serif;font-size:28px}
#page-ai .ptitle{font-family:'Space Grotesk',sans-serif;font-size:26px}
#page-leaderboard .ptitle{font-family:'DM Serif Display',serif;font-size:28px}
#page-settings .ptitle{font-family:'Plus Jakarta Sans',sans-serif;font-size:24px}
.ptitle::after{content:'';display:block;width:32px;height:3px;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:3px;margin-top:8px}
#page-analytics .ptitle::after{background:linear-gradient(90deg,var(--acc2),var(--acc3))}
#page-calendar .ptitle::after{background:linear-gradient(90deg,var(--low),var(--acc2))}
#page-ai .ptitle::after{background:linear-gradient(90deg,var(--acc3),var(--acc))}
#page-leaderboard .ptitle::after{background:linear-gradient(90deg,var(--coin),var(--med))}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px}
.ctitle{font-family:'Fira Code',monospace;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:14px}

/* STATS */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 12px;text-align:center;transition:.2s;cursor:default}
.sc:hover{border-color:var(--border2);transform:translateY(-1px)}
.sv{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;margin-bottom:3px}
.sl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}

/* FORM */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.fgrid .full{grid-column:1/-1}
.fl{font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.8px}
.fi{width:100%;background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:10px 12px;border-radius:10px;font-size:14px;outline:none;font-family:inherit;transition:.2s}
.fi:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(124,58,237,.08)}
.fi option{background:var(--card)}
.fi-ta{min-height:64px;resize:vertical;line-height:1.5}
.frow{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.costs{display:flex;gap:12px;flex-wrap:wrap}
.ci{font-size:11px;color:var(--muted)}
.ci b{color:var(--coin);font-family:'Fira Code',monospace}
.btn-pr{background:var(--acc);color:#fff;border:none;padding:10px 22px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:700;font-family:'Space Grotesk',sans-serif;transition:.2s;letter-spacing:.3px}
.btn-pr:hover{background:var(--accl);transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,58,237,.28)}
.btn-sec{background:var(--card2);border:1px solid var(--border2);color:var(--text2);padding:7px 14px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:.2s}
.btn-sec:hover{border-color:var(--acc);color:var(--accl)}

/* FILTER BAR */
.fbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.srch{position:relative;flex:1;min-width:160px}
.srch input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:9px 12px 9px 32px;border-radius:10px;font-size:13px;outline:none;font-family:inherit;transition:.2s}
.srch input:focus{border-color:var(--acc2)}
.srch .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.fb{background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 13px;border-radius:50px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:.2s;white-space:nowrap}
.fb.on,.fb:hover{border-color:var(--acc);color:var(--accl);background:rgba(124,58,237,.07)}

/* TASKS */
.tlist{display:flex;flex-direction:column;gap:8px}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty .ico{font-size:36px;display:block;margin-bottom:10px}
.empty p{font-size:14px;font-weight:500}

.tc{background:var(--card);border:1px solid var(--border);border-radius:14px;transition:.2s;position:relative;overflow:hidden;animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.tc-bar{position:absolute;left:0;top:0;bottom:0;width:3px}
.tc.high .tc-bar{background:var(--high)}
.tc.medium .tc-bar{background:var(--med)}
.tc.low .tc-bar{background:var(--low)}
.tc:hover{background:var(--card2);border-color:var(--border2)}
.tc.done{opacity:.42}
.tc.done .tc-title{text-decoration:line-through;color:var(--muted)}
.tc.overdue{border-color:rgba(244,63,94,.22)}
.tc-main{display:flex;align-items:flex-start;gap:12px;padding:14px}
.chk{width:20px;height:20px;border:2px solid var(--border2);border-radius:5px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.2s;font-size:11px;font-weight:800;color:transparent;margin-top:1px;background:transparent;min-width:20px;user-select:none}
.chk:hover{border-color:var(--acc)}
.chk.on{background:var(--acc);border-color:var(--acc);color:#fff}
.tc-body{flex:1;min-width:0}
.tc-title{font-size:15px;font-weight:700;margin-bottom:4px;line-height:1.4;letter-spacing:-.2px}
.tc-desc{font-size:12px;color:var(--text2);margin-bottom:5px;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.tc-meta{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.tc-dl{font-family:'Fira Code',monospace;font-size:11px;color:var(--muted)}
.tc-dl.ov{color:var(--high)}
.tc-dl.sn{color:var(--med)}
.ptag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:50px;text-transform:uppercase;letter-spacing:.5px}
.ptag.high{background:rgba(244,63,94,.1);color:var(--high)}
.ptag.medium{background:rgba(251,146,60,.1);color:var(--med)}
.ptag.low{background:rgba(52,211,153,.1);color:var(--low)}
.tl-badge{font-family:'Fira Code',monospace;font-size:10px;color:var(--acc2);background:rgba(6,182,212,.08);padding:2px 7px;border-radius:4px}
.tc-acts{display:flex;gap:4px;flex-shrink:0}
.ib{width:28px;height:28px;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:7px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:.2s;min-width:28px}
.ib:hover{border-color:var(--acc);color:var(--accl)}
.ib.del:hover{border-color:var(--high);color:var(--high);background:rgba(244,63,94,.07)}
.ib.foc:hover{border-color:var(--acc2);color:var(--acc2)}

/* SUBTASKS */
.sub-section{border-top:1px solid var(--border);padding:10px 14px 13px 46px}
.sub-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sub-hdr span{font-family:'Fira Code',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.sub-add-row{display:flex;gap:6px;margin-bottom:8px}
.sub-add-row input{flex:1;background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:7px 10px;border-radius:8px;font-size:13px;outline:none;font-family:inherit;transition:.2s}
.sub-add-row input:focus{border-color:var(--acc)}
.sub-add-row button{background:var(--acc);color:#fff;border:none;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;white-space:nowrap}
.sub-item{border-bottom:1px solid var(--border);padding-bottom:7px;margin-bottom:7px}
.sub-item:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.sub-row{display:flex;align-items:center;gap:8px}
.sub-chk{width:16px;height:16px;border:2px solid var(--border2);border-radius:4px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:transparent;background:transparent;transition:.2s;user-select:none}
.sub-chk:hover{border-color:var(--acc)}
.sub-chk.on{background:var(--acc);border-color:var(--acc);color:#fff}
.sub-title{flex:1;font-size:13px;font-weight:600}
.sub-title.done{text-decoration:line-through;color:var(--muted)}
.sub-count{font-family:'Fira Code',monospace;font-size:10px;color:var(--muted)}
.sub-del{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 5px;transition:.2s}
.sub-del:hover{color:var(--high)}
.sub2-list{margin:5px 0 0 22px;display:flex;flex-direction:column;gap:4px}
.sub2-row{display:flex;align-items:center;gap:7px}
.sub2-chk{width:13px;height:13px;border:1.5px solid var(--border2);border-radius:3px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:transparent;background:transparent;transition:.2s}
.sub2-chk:hover{border-color:var(--acc2)}
.sub2-chk.on{background:var(--acc2);border-color:var(--acc2);color:#fff}
.sub2-title{flex:1;font-size:12px;color:var(--text2)}
.sub2-title.done{text-decoration:line-through;color:var(--muted)}
.sub2-add-row{display:flex;gap:5px;margin-top:5px;margin-left:22px}
.sub2-add-row input{flex:1;background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:5px 8px;border-radius:6px;font-size:12px;outline:none;font-family:inherit}
.sub2-add-row button{background:var(--acc2);color:#fff;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit}
.prog-bar{height:2px;background:var(--border);border-radius:2px;margin-top:5px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:2px;transition:width .4s;box-shadow:0 0 6px rgba(124,58,237,.3)}

/* FOCUS */
#focus-ov{display:none;position:fixed;inset:0;background:var(--bg);z-index:999;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center}
#focus-ov.on{display:flex}
.focus-exit{position:absolute;top:20px;right:20px;background:var(--card);border:1px solid var(--border2);color:var(--text2);padding:8px 16px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:.2s}
.focus-exit:hover{border-color:var(--high);color:var(--high)}
.focus-timer{font-family:'Fira Code',monospace;font-size:80px;font-weight:400;color:var(--acc);letter-spacing:-4px;margin-bottom:8px;line-height:1}
.focus-state{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:30px}
.focus-tname{font-family:'DM Serif Display',serif;font-size:26px;max-width:600px;line-height:1.3;margin-bottom:10px}
.focus-tdesc{font-size:15px;color:var(--text2);max-width:500px;line-height:1.6;margin-bottom:36px}
.focus-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

/* POMODORO */
.pomo-wrap{display:flex;flex-direction:column;align-items:center;gap:20px}
.pomo-ring{position:relative;width:220px;height:220px}
.pomo-ring svg{transform:rotate(-90deg)}
.pomo-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.pomo-time{font-family:'Fira Code',monospace;font-size:42px;font-weight:400;letter-spacing:-2px;line-height:1}
.pomo-lbl{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.pomo-tname{font-size:12px;color:var(--acc2);margin-top:4px;font-weight:600;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pomo-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.pb{padding:11px 22px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:'Space Grotesk',sans-serif;transition:.2s;letter-spacing:.3px}
.pb.start{background:var(--acc);color:#fff}
.pb.start:hover{background:var(--accl);transform:translateY(-1px)}
.pb.pause{background:#f59e0b;color:#000}
.pb.rst{background:var(--card2);border:1px solid var(--border2);color:var(--text2)}
.pb.rst:hover{border-color:var(--acc);color:var(--accl)}
.pb.skip{background:var(--acc2);color:#fff}
.pomo-cfg{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;align-items:center}
.pomo-cfg label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}

.pomo-sel{background:var(--card2);border:1px solid var(--border2);color:var(--text);padding:8px 12px;border-radius:10px;font-size:13px;outline:none;font-family:inherit;max-width:260px;width:100%}

.badge-name{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;margin-bottom:2px}

/* TOAST */
.toasts{position:fixed;bottom:20px;right:14px;z-index:9998;display:flex;flex-direction:column;gap:7px;max-width:290px;pointer-events:none}

function dlInfo(ms, done) {
  if (!ms || done) return {cls:'', txt:''};
  var diff = ms - Date.now();
  var h = diff / 3600000;
  var dt = new Date(ms);
  var s = dt.toLocaleDateString('uz-UZ', {day:'numeric', month:'short'}) + ' ' + dt.toLocaleTimeString('uz-UZ', {hour:'2-digit', minute:'2-digit'});
  if (diff < 0) return {cls:'ov', txt:'⚠ Muddati o\'tdi!'};
  if (h < 3) return {cls:'sn', txt:'🔥 ' + timeLeft(ms) + ' qoldi'};
  if (h < 24) return {cls:'sn', txt:'⏰ ' + s};
  return {cls:'', txt:'📅 ' + s};
}

function saveUser(u) {
  var us = S.u();
  us[u.username] = u;
  S.su(us);
  S.ss(u);
  user = u;
  updTop();
}

function saveTasks(t) {
  S.st(user.username, t);
  tasks = t;
}

function actCount() { return tasks.filter(function(t) { return !t.completed; }).length; }

function getLB() {
  return Object.values(S.u()).sort(function(a,b) { return b.coins - a.coins; }).slice(0,10);
}

function prodScore() {
  if (!tasks.length) return 0;
  var done = tasks.filter(function(t) { return t.completed; }).length;
  var onTime = tasks.filter(function(t) { return t.completed && (!t.dm || t.completedAt <= t.dm); }).length;
  return Math.min(Math.round((done/tasks.length)*50 + (onTime/Math.max(done,1))*30 + Math.min((user.streak||0)*2,20)), 100);
}

function weeklyData() {
  var days = [];
  var now = new Date();
  for (var i = 6; i >= 0; i--) {
    var d = new Date(now);
    d.setDate(d.getDate() - i);
    var ds = d.toISOString().split('T')[0];
    var c = tasks.filter(function(t) { return t.completed && t.completedAt && new Date(t.completedAt).toISOString().split('T')[0] === ds; }).length;
    days.push({lbl: ['Ya','Du','Se','Ch','Pa','Ju','Sh'][d.getDay()], c: c});
  }
  return days;
}

function checkBadges() {
  var badges = user.badges || [];
  var added = [];
  var pd = S.pd();
  var defs = [
    {id:'first',  n:'Birinchi qadam', i:'🎯', d:'Birinchi vazifani bajaring',  ok: function() { return (user.total||0) >= 1; }},
    {id:'done10', n:'10 vazifa',      i:'✅', d:'10 ta vazifani bajaring',      ok: function() { return (user.total||0) >= 10; }},
    {id:'done50', n:'50 vazifa',      i:'🏅', d:'50 ta vazifani bajaring',      ok: function() { return (user.total||0) >= 50; }},
    {id:'streak5',n:'5 kun streak',   i:'🔥', d:'5 kun ketma-ket bajaring',     ok: function() { return (user.streak||0) >= 5; }},
    {id:'streak10',n:'10 kun streak', i:'💫', d:'10 kun ketma-ket bajaring',    ok: function() { return (user.streak||0) >= 10; }},
    {id:'pomo10', n:'Pomodoro Pro',   i:'⏱', d:'10 pomodoro sessiyasi',         ok: function() { return pd.sessions >= 10; }},
    {id:'rich',   n:'Badavlat',       i:'💰', d:'500 tanga to\'plang',           ok: function() { return (user.coins||0) >= 500; }},
    {id:'early',  n:'Vaqtida',        i:'⚡', d:'5 ta vaqtida bajaring',         ok: function() { return tasks.filter(function(t) { return t.completed && t.dm && t.completedAt && t.completedAt <= t.dm; }).length >= 5; }}
  ];
  defs.forEach(function(b) {
    if (badges.indexOf(b.id) < 0 && b.ok()) { badges.push(b.id); added.push(b); }
  });
  if (added.length) {
    saveUser(Object.assign({}, user, {badges: badges}));
    added.forEach(function(b) { toast('🏆 Yangi yutuq: ' + b.n + ' ' + b.i, 'rw'); });
  }
  return defs.map(function(b) { return Object.assign({}, b, {earned: badges.indexOf(b.id) >= 0}); });
}

function doAuth() {
  var un = document.getElementById('a-un').value.trim().toLowerCase().replace(/\s/g,'');
  var pw = document.getElementById('a-pw').value;
  var err = document.getElementById('aerr');
  err.style.display = 'none';
  if (!un || !pw) { err.textContent = '⚠ Barcha maydonlarni to\'ldiring!'; err.style.display = 'block'; return; }
  if (un.length < 3) { err.textContent = '⚠ Username kamida 3 ta harf!'; err.style.display = 'block'; return; }
  if (pw.length < 4) { err.textContent = '⚠ Parol kamida 4 ta belgi!'; err.style.display = 'block'; return; }
  var users = S.u();
  if (authTab === 'register') {
    if (users[un]) { err.textContent = '⚠ Bu username band! Boshqa tanlang.'; err.style.display = 'block'; return; }
    var u = {username:un, password:pw, coins:100, streak:0, total:0, joined:Date.now(), badges:[]};
    users[un] = u; S.su(users); S.ss(u); user = u; tasks = [];
    toast('Xush kelibsiz, ' + un + '! 🎉 100 tanga berildi!', 'rw');
  } else {
    var u = users[un];
    if (!u || u.password !== pw) { err.textContent = '⚠ Username yoki parol noto\'g\'ri!'; err.style.display = 'block'; return; }
    S.ss(u); user = u; tasks = S.t(un);
    toast('Xush kelibsiz, ' + un + '! 🎯', 'rw');
  }
  document.getElementById('auth-page').style.display = 'none';
  document.getElementById('app-page').style.display = 'block';
  applyTheme(cfg.theme);
  updTop();
  goPage('tasks');
}

function renderTasks() {
  var done = tasks.filter(function(t) { return t.completed; }).length;

  var minDt = new Date(Date.now() + 3600000).toISOString().slice(0,16);
  var filt = tasks.filter(function(t) {
    var fm = filter === 'all'
      || (filter === 'active' && !t.completed)
      || (filter === 'done' && t.completed)
      || (filter === 'today' && t.dm && new Date(t.dm).toISOString().split('T')[0] === tod())
      || (filter === 'overdue' && !t.completed && t.dm && t.dm < Date.now());
    return fm && t.title.toLowerCase().indexOf(search.toLowerCase()) >= 0;
  });

  var h = '<div class="ptitle">Vazifalar</div>';
  h += '<div class="sgrid">'
    + '<div class="sc"><div class="sv" style="color:var(--accl)">' + user.coins + '</div><div class="sl">🪙 Tangalar</div></div>'
    + '<div class="sc"><div class="sv" style="color:var(--low)">' + done + '</div><div class="sl">✅ Bajarilgan</div></div>'
    + '<div class="sc"><div class="sv" style="color:var(--med)">' + (tasks.length - done) + '</div><div class="sl">⏳ Aktiv</div></div>'
    + '<div class="sc"><div class="sv" style="color:var(--high)">' + over + '</div><div class="sl">⚠ Muddati o\'tgan</div></div>'
    + '</div>';

  h += '<div class="card">'
    + '<div class="ctitle">// Yangi vazifa qo\'shish</div>'
    + '<div class="fgrid">'
    + '<div class="full"><div class="fl">Vazifa nomi *</div><input class="fi" id="n-t" type="text" placeholder="Nima qilish kerak?" onkeydown="if(event.key===\'Enter\')addTask()"></div>'
    + '<div class="full"><div class="fl">Tavsif</div><textarea class="fi fi-ta" id="n-d" placeholder="Qo\'shimcha izoh..."></textarea></div>'
    + '<div><div class="fl">Deadline (min 1 soat keyin)</div><input class="fi" id="n-dl" type="datetime-local" min="' + minDt + '"></div>'
    + '<div><div class="fl">Muhimlik darajasi</div><select class="fi" id="n-p"><option value="high">🔴 Yuqori</option><option value="medium" selected>🟠 O\'rta</option><option value="low">🟢 Past</option></select></div>'
    + '</div>'
    + '<div class="frow">'
    + '<div class="costs"><span class="ci">Qo\'shish: <b>-5🪙</b></span><span class="ci">Vaqtida: <b>+20🪙</b></span><span class="ci">Kechikish: <b>-10🪙</b></span><span class="ci">O\'chirish: <b>-3🪙</b></span></div>'
    + '<button class="btn-pr" onclick="addTask()">+ Qo\'shish</button>'
    + '</div></div>';

  h += '<div class="fbar">'
    + '<div class="srch"><span class="si">🔍</span><input type="text" placeholder="Qidirish..." value="' + esc(search) + '" oninput="search=this.value;renderTasks()"></div>';
  [['all','Barchasi'],['active','Aktiv'],['today','Bugun'],['done','Bajarilgan'],['overdue','Muddati o\'tgan']].forEach(function(x) {
    h += '<button class="fb' + (filter === x[0] ? ' on' : '') + '" onclick="filter=\'' + x[0] + '\';renderTasks()">' + x[1] + '</button>';
  });
  h += '</div>';

  if (filt.length === 0) {
    h += '<div class="empty"><span class="ico">✦</span><p>Hali vazifa yo\'q — birinchisini yarating!</p></div>';
  } else {
    h += '<div class="tlist" id="tlist">' + filt.map(function(t) { return renderTC(t); }).join('') + '</div>';
  }
  document.getElementById('page-tasks').innerHTML = h;
  bindDrag();
}

function renderTC(t) {
  var dl = dlInfo(t.dm, t.completed);
  var tl = t.dm && !t.completed ? timeLeft(t.dm) : null;
  var ov = t.dm && !t.completed && t.dm < Date.now();
  var subs = t.subs || [];
  var s2tot = subs.reduce(function(a,s) { return a + (s.subs2||[]).length; }, 0);
  var s2done = subs.reduce(function(a,s) { return a + (s.subs2||[]).filter(function(x) { return x.done; }).length; }, 0);
  var sDone = subs.filter(function(s) { return s.done; }).length;
  var tot = subs.length + s2tot;
  var doneItems = sDone + s2done;
  var pct = tot > 0 ? Math.round(doneItems/tot*100) : 0;
  var exp = exTasks[t.id];

  var h = '<div class="tc ' + t.p + (t.completed?' done':'') + (ov?' overdue':'') + '" draggable="true" data-id="' + t.id + '">'
    + '<div class="tc-bar"></div>'
    + '<div class="tc-main">'
    + '<div class="chk' + (t.completed?' on':'') + '" onclick="toggleTask(' + t.id + ')">' + (t.completed?'✓':'') + '</div>'
    + '<div class="tc-body">'
    + '<div class="tc-title">' + esc(t.title) + '</div>'
    + (t.desc ? '<div class="tc-desc">' + esc(t.desc) + '</div>' : '')
    + '<div class="tc-meta">'
    + (t.dm ? '<span class="tc-dl ' + dl.cls + '">' + dl.txt + '</span>' : '<span class="tc-dl">📋 Deadline yo\'q</span>')
    + '<span class="ptag ' + t.p + '">' + (t.p==='high'?'Yuqori':t.p==='medium'?'O\'rta':'Past') + '</span>'
    + (tl && !ov ? '<span class="tl-badge">' + tl + ' qoldi</span>' : '')
    + (tot > 0 ? '<span style="font-size:10px;color:var(--muted);font-family:\'Fira Code\',monospace">📋 ' + doneItems + '/' + tot + '</span>' : '')
    + '</div>'
    + (tot > 0 ? '<div class="prog-bar"><div class="prog-fill" style="width:' + pct + '%"></div></div>' : '')
    + '</div>'
    + '<div class="tc-acts">'
    + '<button class="ib foc" onclick="startFocus(' + t.id + ')" title="Fokus rejimi">🎯</button>'
    + '<button class="ib" onclick="toggleExp(' + t.id + ')" title="Bo\'limlar">' + (exp?'▲':'▼') + '</button>'
    + '<button class="ib del" onclick="deleteTask(' + t.id + ')">🗑</button>'
    + '</div></div>';

  if (exp) {
    h += '<div class="sub-section">'
      + '<div class="sub-hdr"><span>Bo\'limlar (' + subs.length + ')</span><button class="btn-sec" style="font-size:11px;padding:4px 10px" onclick="toggleSA(\'sa_' + t.id + '\')">+ Bo\'lim</button></div>';
    if (showSubAdd['sa_' + t.id]) {
      h += '<div class="sub-add-row"><input id="si-' + t.id + '" type="text" placeholder="Bo\'lim nomi..." onkeydown="if(event.key===\'Enter\')addSub(' + t.id + ')"><button onclick="addSub(' + t.id + ')">Qo\'shish</button></div>';
    }
    subs.forEach(function(s, si) {
      var s2 = s.subs2 || [];
      var s2d = s2.filter(function(x) { return x.done; }).length;
      h += '<div class="sub-item">'
        + '<div class="sub-row">'
        + '<div class="sub-chk' + (s.done?' on':'') + '" onclick="toggleSub(' + t.id + ',' + si + ')">' + (s.done?'✓':'') + '</div>'
        + '<div class="sub-title' + (s.done?' done':'') + '">' + esc(s.title) + '</div>'
        + (s2.length ? '<span class="sub-count">' + s2d + '/' + s2.length + '</span>' : '')
        + '<button class="btn-sec" style="font-size:10px;padding:2px 8px" onclick="toggleSA(\'s2a_' + t.id + '_' + si + '\')">+ Kichik</button>'
        + '<button class="sub-del" onclick="delSub(' + t.id + ',' + si + ')">✕</button>'
        + '</div>'
        + (s2.length ? '<div class="sub2-list">' + s2.map(function(x,xi) {
            return '<div class="sub2-row">'
              + '<div class="sub2-chk' + (x.done?' on':'') + '" onclick="toggleSub2(' + t.id + ',' + si + ',' + xi + ')">' + (x.done?'✓':'') + '</div>'
              + '<div class="sub2-title' + (x.done?' done':'') + '">' + esc(x.title) + '</div>'
              + '<button class="sub-del" onclick="delSub2(' + t.id + ',' + si + ',' + xi + ')">✕</button>'
              + '</div>';
          }).join('') + '</div>' : '')
        + (showSub2Add['s2a_' + t.id + '_' + si] ? '<div class="sub2-add-row"><input id="s2i-' + t.id + '-' + si + '" type="text" placeholder="Kichik vazifa..." onkeydown="if(event.key===\'Enter\')addSub2(' + t.id + ',' + si + ')"><button onclick="addSub2(' + t.id + ',' + si + ')">+</button></div>' : '')
        + '</div>';
    });
    h += '</div>';
  }
  h += '</div>';
  return h;
}

function toggleExp(id) { exTasks[id] = !exTasks[id]; renderTasks(); }
function toggleSA(k) { showSubAdd[k] = !showSubAdd[k]; showSub2Add = {}; renderTasks(); }

function addTask() {
  var te = document.getElementById('n-t');
  var de = document.getElementById('n-d');
  var dle = document.getElementById('n-dl');
  var pe = document.getElementById('n-p');
  var title = te ? te.value.trim() : '';
  if (!title) { toast('Vazifa nomini kiriting!', 'pn'); return; }
  var dm = null;
  if (dle && dle.value) {
    var dt = new Date(dle.value).getTime();
    if (dt < Date.now() + 3600000) { toast('Deadline kamida 1 soatdan keyin bo\'lsin!', 'pn'); return; }
    dm = dt;
  }
  if (user.coins < 5) { toast('Tangalar yetarli emas! (5🪙 kerak)', 'pn'); return; }
  var task = {id:Date.now(), title:title, desc:de?de.value.trim():'', p:pe?pe.value:'medium', dm:dm, completed:false, created:Date.now(), subs:[]};
  saveTasks([task].concat(tasks));
  saveUser(Object.assign({}, user, {coins: user.coins - 5}));
  toast('Vazifa qo\'shildi! -5🪙', 'pn');
  renderTasks();
}

function toggleTask(id) {
  var t = tasks.find(function(x) { return x.id === id; });
  if (!t) return;
  var done = t.completed;
  var dc = 0, msg = '', ns = user.streak, ca = null;
  if (!done) {
    ca = Date.now();
    if (t.dm && ca > t.dm) { dc = -10; msg = '⏰ Deadline o\'tgan edi! -10🪙'; ns = 0; }
    else { dc = t.dm ? 20 : 10; msg = t.dm ? '⚡ Vaqtida! +20🪙' : '✅ Bajarildi! +10🪙'; ns = user.streak + 1; }
    saveTasks(tasks.map(function(x) { return x.id===id ? Object.assign({},x,{completed:true,completedAt:ca}) : x; }));
  } else {
    dc = -5; msg = '🔄 Qayta ochildi. -5🪙'; ns = 0;
    saveTasks(tasks.map(function(x) { return x.id===id ? Object.assign({},x,{completed:false,completedAt:null}) : x; }));
  }
  saveUser(Object.assign({}, user, {coins:Math.max(0,user.coins+dc), streak:ns, total:user.total+(!done?1:-1)}));
  checkBadges();
  toast(msg, dc > 0 ? 'rw' : 'pn');
  renderTasks();
}

function deleteTask(id) {
  var t = tasks.find(function(x) { return x.id === id; });
  if (!t) return;
  saveTasks(tasks.filter(function(x) { return x.id !== id; }));
  if (!t.completed) { saveUser(Object.assign({}, user, {coins:Math.max(0,user.coins-3)})); toast('O\'chirildi. -3🪙', 'pn'); }
  else toast('O\'chirildi', 'in');
  renderTasks();
}

function addSub(tid) {
  var inp = document.getElementById('si-' + tid);
  if (!inp || !inp.value.trim()) return;
  var t = tasks.find(function(x) { return x.id === tid; });
  if (!t) return;
  var s = (t.subs||[]).slice();
  s.push({title:inp.value.trim(), done:false, subs2:[]});
  saveTasks(tasks.map(function(x) { return x.id===tid ? Object.assign({},x,{subs:s}) : x; }));
  showSubAdd['sa_' + tid] = false;
  renderTasks();
}
function toggleSub(tid,si) {
  var t = tasks.find(function(x) { return x.id===tid; });
  if (!t) return;
  var s = (t.subs||[]).slice();
  s[si] = Object.assign({}, s[si], {done:!s[si].done});
  saveTasks(tasks.map(function(x) { return x.id===tid ? Object.assign({},x,{subs:s}) : x; }));
  renderTasks();
}
function delSub(tid,si) {
  var t = tasks.find(function(x) { return x.id===tid; });
  if (!t) return;
  var s = (t.subs||[]).filter(function(_,i) { return i!==si; });
  saveTasks(tasks.map(function(x) { return x.id===tid ? Object.assign({},x,{subs:s}) : x; }));
  renderTasks();
}
function addSub2(tid,si) {
  var inp = document.getElementById('s2i-' + tid + '-' + si);
  if (!inp || !inp.value.trim()) return;
  var t = tasks.find(function(x) { return x.id===tid; });
  if (!t) return;
  var s = (t.subs||[]).slice();
  var sub = Object.assign({}, s[si]);
  sub.subs2 = (sub.subs2||[]).slice();
  sub.subs2.push({title:inp.value.trim(), done:false});
  s[si] = sub;
  saveTasks(tasks.map(function(x) { return x.id===tid ? Object.assign({},x,{subs:s}) : x; }));
  showSub2Add['s2a_' + tid + '_' + si] = false;
  renderTasks();
}
function toggleSub2(tid,si,xi) {
  var t = tasks.find(function(x) { return x.id===tid; });
  if (!t) return;
  var s = (t.subs||[]).slice();
  var sub = Object.assign({}, s[si]);
  sub.subs2 = sub.subs2.slice();
  sub.subs2[xi] = Object.assign({}, sub.subs2[xi], {done:!sub.subs2[xi].done});
  s[si] = sub;
  saveTasks(tasks.map(function(x) { return x.id===tid ? Object.assign({},x,{subs:s}) : x; }));
  renderTasks();
}
function delSub2(tid,si,xi) {
  var t = tasks.find(function(x) { return x.id===tid; });
  if (!t) return;
  var s = (t.subs||[]).slice();
  var sub = Object.assign({}, s[si]);

// DRAG & DROP
function bindDrag() {
  document.querySelectorAll('.tc[draggable]').forEach(function(el) {
    el.addEventListener('dragstart', function() { dragId = parseInt(el.dataset.id); setTimeout(function() { el.classList.add('dragging'); }, 0); });
    el.addEventListener('dragend', function() { el.classList.remove('dragging'); dragId = null; });
    el.addEventListener('dragover', function(e) { e.preventDefault(); el.classList.add('drag-over'); });
    el.addEventListener('dragleave', function() { el.classList.remove('drag-over'); });
    el.addEventListener('drop', function(e) {
      e.preventDefault(); el.classList.remove('drag-over');
      if (!dragId || dragId === parseInt(el.dataset.id)) return;
      var fi = tasks.findIndex(function(t) { return t.id === dragId; });
      var ti = tasks.findIndex(function(t) { return t.id === parseInt(el.dataset.id); });
      if (fi < 0 || ti < 0) return;
      var nt = tasks.slice();
      var item = nt.splice(fi,1)[0];
      nt.splice(ti,0,item);
      saveTasks(nt);
      renderTasks();
    });
  });
}

function pomSecs() { return pom.mode==='work' ? cfg.workMin*60 : pom.mode==='break' ? cfg.breakMin*60 : cfg.longBreakMin*60; }

function pomToggle() {
  if (pom.run) { clearInterval(pom.iv); pom.iv = null; pom.run = false; }
  else {
    if (!pom.secs) pom.secs = pomSecs();
    pom.run = true;
    pom.iv = setInterval(function() { pom.secs--; updPomUI(); updFocUI(); if (pom.secs <= 0) pomComplete(); }, 1000);
  }
  updPomUI(); updFocUI();
}
function pomReset() { clearInterval(pom.iv); pom.iv=null; pom.run=false; pom.secs=0; updPomUI(); updFocUI(); }
function pomSkip() {
  clearInterval(pom.iv); pom.iv=null; pom.run=false; pom.secs=0;
  if (pom.mode==='work') { pom.sess++; pom.mode = pom.sess%4===0 ? 'longBreak' : 'break'; }
  else pom.mode = 'work';
  pom.secs = pomSecs(); updPomUI(); updFocUI();
}
function pomComplete() {
  clearInterval(pom.iv); pom.iv=null; pom.run=false;
  if (pom.mode==='work') {
    pom.sess++;
    var pd = S.pd(); pd.sessions++; pd.totalWork += cfg.workMin;
    var nd = tod(); if (pd.todayDate !== nd) { pd.today=0; pd.todayDate=nd; } pd.today++; S.spd(pd);
    saveUser(Object.assign({}, user, {coins:user.coins+5}));
    toast('🍅 Pomodoro tugadi! +5🪙', 'rw');
    pom.mode = pom.sess%4===0 ? 'longBreak' : 'break';
  } else {
    toast('☕ Tanaffus tugadi! Ishlash vaqti!', 'info');
    pom.mode = 'work';

  pom.secs = pomSecs();
  if (curPage === 'pomodoro') renderPomodoro();
  updFocUI();
}

var MN = ['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentabr','Oktabr','Noyabr','Dekabr'];
var DN = ['Du','Se','Ch','Pa','Ju','Sh','Ya'];

function renderCalendar() {
  var y = calYear, m = calMonth;
  var first = new Date(y,m,1).getDay();
  var off = (first+6)%7;
  var dim = new Date(y,m+1,0).getDate();
  var prev = new Date(y,m,0).getDate();
  var ts = tod();
  var tm = {};
  tasks.forEach(function(t) {
    if (!t.dm) return;
    var d = new Date(t.dm).toISOString().split('T')[0];
    if (!tm[d]) tm[d] = [];
    tm[d].push(t);
  });

  var h = '<div class="ptitle">Kunlik Planner</div>';
  h += '<div class="card">'
    + '<div class="cal-nav"><h3>' + MN[m] + ' ' + y + '</h3><div class="cal-nbts"><button onclick="calP()">‹</button><button onclick="calT()" style="width:auto;padding:0 10px;font-size:12px">Bugun</button><button onclick="calN()">›</button></div></div>'
    + '<div class="mbtns">' + MN.map(function(mn,i) { return '<button class="mbtn' + (calMonth===i?' on':'') + '" onclick="calMonth=' + i + ';renderCalendar()">' + mn.slice(0,3) + '</button>'; }).join('') + '</div>'
    + '<div class="cal-head">' + DN.map(function(d) { return '<div class="ch">' + d + '</div>'; }).join('') + '</div>'
    + '<div class="cgrid">';
  for (var i = off-1; i >= 0; i--) h += '<div class="cd other"><div class="cn">' + (prev-i) + '</div></div>';
  for (var d = 1; d <= dim; d++) {
    var ds = y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    var iT = ds===ts, iS = selDay===ds, dt = tm[ds]||[];
    h += '<div class="cd' + (iT?' today':'') + (iS?' sel':'') + (dt.length?' has-t':'') + '" onclick="selDay=selDay===\'' + ds + '\'?null:\'' + ds + '\';renderCalendar()">'
      + '<div class="cn">' + d + '</div>'
      + '<div class="cdots">' + dt.slice(0,4).map(function(t) { return '<div class="cdot ' + t.p + '"></div>'; }).join('') + '</div>'
      + '</div>';
  }
  var rem = (off+dim)%7; if (rem) for (var i=1;i<=7-rem;i++) h += '<div class="cd other"><div class="cn">' + i + '</div></div>';
  h += '</div></div>';
  if (selDay) {
    var st = tm[selDay]||[];
    var sd = new Date(selDay);
    var dl = sd.toLocaleDateString('uz-UZ', {weekday:'long', month:'long', day:'numeric'});
    h += '<div class="day-panel"><h4>📅 ' + esc(dl) + ' <span style="font-size:13px;color:var(--muted);font-family:inherit">(' + st.length + ' ta vazifa)</span></h4>';
    if (!st.length) h += '<div style="text-align:center;padding:16px;color:var(--muted);font-size:13px">Bu kunda vazifalar yo\'q</div>';
    else st.forEach(function(t) {
      var time = t.dm ? new Date(t.dm).toLocaleTimeString('uz-UZ', {hour:'2-digit', minute:'2-digit'}) : '--:--';
      h += '<div class="dt ' + t.p + (t.completed?' done':'') + '"><div class="dt-time">' + time + '</div><div class="dt-title' + (t.completed?' done':'') + '">' + esc(t.title) + '</div><span class="ptag ' + t.p + '">' + (t.p==='high'?'Yuqori':t.p==='medium'?'O\'rta':'Past') + '</span></div>';
    });
    h += '</div>';
  }
  document.getElementById('page-calendar').innerHTML = h;
}
function calP() { calMonth--; if (calMonth<0) { calMonth=11; calYear--; } renderCalendar(); }
function calN() { calMonth++; if (calMonth>11) { calMonth=0; calYear++; } renderCalendar(); }
function calT() { calYear=new Date().getFullYear(); calMonth=new Date().getMonth(); renderCalendar(); }

async function sendAI() {
  var inp = document.getElementById('ai-inp');
  if (!inp) return;
  var text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  aiHist.push({r:'user', t:text});
  var chat = document.getElementById('ai-chat');
  var ldEl = null;
  if (chat) {
    var uEl = document.createElement('div');
    uEl.className = 'ai-msg user';
    uEl.textContent = text;
    chat.appendChild(uEl);
    ldEl = document.createElement('div');
    ldEl.className = 'ai-msg ai';
    ldEl.innerHTML = '<div class="ai-lbl">AI Mentor</div><div class="ai-dots"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div></div>';
    chat.appendChild(ldEl);
    chat.scrollTop = chat.scrollHeight;
  }
  var ts = tasks.slice(0,12).map(function(t) {
    return '• ' + t.title + ' [' + t.p + ']' + (t.dm?' deadline:'+new Date(t.dm).toLocaleDateString('uz-UZ'):'') + (t.completed?' ✅':'');
  }).join('\n');
  var L = getLang();
  var sys = 'You are AI Mentor of TaskVault Pro. User: ' + user.username + '. Tasks: ' + tasks.length + ' total (' + tasks.filter(function(t){return t.completed;}).length + ' done). Streak: ' + user.streak + '. Coins: ' + user.coins + '.\n\nTask list:\n' + ts + '\n\nInstruction: ' + L.sys + ' No markdown.';
  try {
    var msgs = [{role:'system', content:sys}];
    aiHist.filter(function(m) { return m.r==='user' || m.r==='ai'; }).slice(-8).forEach(function(m) {
      msgs.push({role: m.r==='ai'?'assistant':'user', content: m.t});
    });
    var res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'Authorization':'Bearer ' + GROQ_KEY},
      body: JSON.stringify({model:GROQ_MODEL, messages:msgs, max_tokens:600, temperature:.7})
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error && data.error.message || 'API xatosi: ' + res.status);
    var reply = data.choices[0].message.content;
    aiHist.push({r:'ai', t:reply});
    S.sai(aiHist.slice(-20));
    if (chat && ldEl) {
      ldEl.innerHTML = '<div class="ai-lbl">AI Mentor</div>' + esc(reply).replace(/\n/g,'<br>');
      chat.scrollTop = chat.scrollHeight;
    }
  } catch(e) {
    aiHist.pop();
    var em = 'Xato: ' + (e.message || 'API bilan bog\'lanib bo\'lmadi');
    if (chat && ldEl) ldEl.innerHTML = '<div class="ai-lbl">AI Mentor</div>' + esc(em);
    toast('AI xatosi: ' + e.message, 'pn');
  }
}

      + '<div class="lb-rank">' + (md[i]||i+1) + '</div>'
      + '<div class="lb-av">' + esc(u.username[0].toUpperCase()) + '</div>'
      + '<div class="lb-name">' + esc(u.username) + (u.username===user.username?' <span style="font-size:11px;color:var(--accl)">(siz)</span>':'') + '</div>'
      + '<div><div class="lb-coins">🪙 ' + u.coins + '</div>' + (u.streak>0?'<div class="lb-str">🔥 '+u.streak+' streak</div>':'') + '</div>'
      + '</div>';
  });
  document.getElementById('page-leaderboard').innerHTML = h;
}

// ═══════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════
function renderSettings() {
  var over = tasks.filter(function(t) { return !t.completed && t.dm && t.dm < Date.now(); }).length;
  var h = '<div class="ptitle">Sozlamalar</div>';
  h += '<div class="ss"><h3>Profil ma\'lumotlari</h3>'
    + '<div class="srow"><div><div class="slabel">Username</div><div class="sdesc">' + esc(user.username) + '</div></div></div>'
    + '<div class="srow"><div><div class="slabel">A\'zo bo\'lgan sana</div><div class="sdesc">' + (user.joined?new Date(user.joined).toLocaleDateString('uz-UZ'):'—') + '</div></div></div>'
    + '<div class="srow" style="border:none;padding-top:4px"><div style="width:100%"><div class="slabel" style="margin-bottom:6px">Parolni o\'zgartirish</div>'
    + '<div class="pw-row"><input type="password" id="npw" placeholder="Yangi parol (4+ belgi)"><button class="save-btn" onclick="savePw()">Saqlash</button></div>'
    + '</div></div></div>';
  h += '<div class="ss"><h3>Mening statistikam</h3>'
    + '<div class="srow"><div><div class="slabel">Tangalar</div></div><span style="color:var(--coin);font-weight:800;font-size:17px;font-family:\'Space Grotesk\',sans-serif">🪙 ' + user.coins + '</span></div>'
    + '<div class="srow"><div><div class="slabel">Streak</div></div><span style="color:var(--med);font-weight:800;font-size:17px;font-family:\'Space Grotesk\',sans-serif">🔥 ' + user.streak + '</span></div>'
    + '<div class="srow"><div><div class="slabel">Jami bajarilgan</div></div><span style="color:var(--low);font-weight:800;font-size:17px;font-family:\'Space Grotesk\',sans-serif">✅ ' + user.total + '</span></div>'
    + '<div class="srow"><div><div class="slabel">Productivity Score</div></div><span style="color:var(--accl);font-weight:800;font-size:17px;font-family:\'Space Grotesk\',sans-serif">' + prodScore() + '/100</span></div>'
    + '<div class="srow"><div><div class="slabel">Yutuqlar (Badges)</div></div><span style="color:var(--coin);font-weight:700;font-family:\'Fira Code\',monospace">' + ((user.badges||[]).length) + '/8</span></div>'
    + '<div class="srow" style="border:none"><div><div class="slabel">Jami vazifalar</div></div><span style="color:var(--text2);font-family:\'Fira Code\',monospace">' + tasks.length + '</span></div>'
    + '</div>';
  h += '<div class="ss"><h3>Bildirishnomalar</h3>'
    + '<div class="srow"><div><div class="slabel">Deadline eslatmalari</div><div class="sdesc">Vaqt yaqinlashganda xabar</div></div><button class="tog' + (cfg.notif?' on':'') + '" onclick="togC(\'notif\')"></button></div>'
    + '<div class="srow" style="border:none"><div><div class="slabel">Ovozli signal</div><div class="sdesc">Pomodoro tugaganda ovoz</div></div><button class="tog' + (cfg.sounds?' on':'') + '" onclick="togC(\'sounds\')"></button></div>'
    + '</div>';
  h += '<div class="danger-s"><h3>⚠ Xavfli zona</h3>'
    + '<div class="srow"><div><div class="slabel">Barcha vazifalarni o\'chirish</div><div class="sdesc">Bu amalni qaytarib bo\'lmaydi</div></div><button class="dbtn" onclick="clearTasks()">Tozalash</button></div>'
    + '<div class="srow" style="border:none"><div><div class="slabel">Hisobni o\'chirish</div><div class="sdesc">Hamma ma\'lumot o\'chadi</div></div><button class="dbtn" onclick="delAcc()">O\'chirish</button></div>'
    + '</div>';
  document.getElementById('page-settings').innerHTML = h;
}
function togC(k) { cfg[k] = !cfg[k]; S.sc(cfg); renderSettings(); }
function savePw() {
  var pw = document.getElementById('npw').value;
  if (pw.length < 4) { toast('Parol kamida 4 ta belgi!', 'pn'); return; }
  saveUser(Object.assign({}, user, {password:pw}));
  toast('Parol o\'zgartirildi ✅', 'rw');
}
function clearTasks() {
  if (confirm('Barcha vazifalarni o\'chirasizmi?')) { saveTasks([]); toast('Tozalandi', 'pn'); if (curPage==='tasks') renderTasks(); }
}
function delAcc() {
  if (confirm('Hisobni o\'chirasizmi? Bu amalni qaytarib bo\'lmaydi!')) {
    var us = S.u(); delete us[user.username]; S.su(us);
    localStorage.removeItem('tvp_t_' + user.username); S.cs();
    user = null; tasks = [];
    document.getElementById('app-page').style.display = 'none';
    document.getElementById('auth-page').style.display = 'flex';
    toast('Hisob o\'chirildi', 'pn');
  }
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
(function() {
  applyTheme(cfg.theme);
  var sess = S.sess();
  if (sess) {
    var fresh = S.u()[sess.username];
    user = fresh || sess;
    tasks = S.t(user.username);
    document.getElementById('auth-page').style.display = 'none';
    document.getElementById('app-page').style.display = 'block';
    updTop();
    goPage('tasks');
  }
  setInterval(function() { if (user && curPage==='tasks') renderTasks(); }, 60000);
})();
</script>
</body>
</html>
