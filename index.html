<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>TaskVault — Vazifalar</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#c8ff00"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="TaskVault"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png"/>

<!-- SEO -->
<meta name="description" content="Vazifalarni boshqaring, tanga toping, reyting tizimida yuqoriga chiqing!"/>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;
  --surface:#111118;
  --card:#16161f;
  --border:#2a2a3a;
  --accent:#c8ff00;
  --accent2:#ff6b35;
  --accent3:#7c3aed;
  --text:#e8e8f0;
  --muted:#6b6b80;
  --high:#ff4757;
  --med:#ffa502;
  --low:#2ed573;
  --coin:#f9c74f;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden}

/* BACKGROUND BLOBS */
.bg-blob{position:fixed;border-radius:50%;filter:blur(80px);opacity:.12;pointer-events:none;z-index:0}
.blob1{width:500px;height:500px;background:var(--accent3);top:-100px;right:-100px;animation:drift1 12s ease-in-out infinite}
.blob2{width:400px;height:400px;background:var(--accent2);bottom:-80px;left:-80px;animation:drift2 15s ease-in-out infinite}
.blob3{width:300px;height:300px;background:var(--accent);top:40%;left:30%;animation:drift3 10s ease-in-out infinite}
@keyframes drift1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-30px,40px) scale(1.1)}}
@keyframes drift2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-20px) scale(1.05)}}
@keyframes drift3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-20px,30px) scale(.95)}}

/* MAIN WRAPPER */
.app{position:relative;z-index:1;min-height:100vh}

/* ─── AUTH PAGE ─────────────────────────────────────────────── */
.auth-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.auth-box{background:rgba(22,22,31,.85);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:24px;padding:3rem 2.5rem;width:100%;max-width:420px;box-shadow:0 0 60px rgba(124,58,237,.15)}
.auth-logo{font-size:2.4rem;font-weight:800;letter-spacing:-2px;margin-bottom:.3rem}
.auth-logo span{color:var(--accent)}
.auth-sub{color:var(--muted);font-family:'DM Mono',monospace;font-size:.8rem;margin-bottom:2.5rem}
.tabs{display:flex;gap:0;margin-bottom:2rem;background:var(--bg);border-radius:12px;padding:4px}
.tab{flex:1;padding:.7rem;text-align:center;cursor:pointer;border-radius:8px;font-size:.9rem;font-weight:600;transition:all .3s;color:var(--muted)}
.tab.active{background:var(--card);color:var(--accent);box-shadow:0 0 20px rgba(200,255,0,.1)}
.field{margin-bottom:1.2rem}
.field label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:.5rem;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase}
.field input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:.8rem 1rem;border-radius:12px;font-family:'Syne',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--accent)}
.btn-main{width:100%;padding:.9rem;background:var(--accent);color:#000;font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;border:none;border-radius:12px;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(200,255,0,.3)}
.btn-main:active{transform:translateY(0)}
.auth-error{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);color:#ff6b81;padding:.8rem 1rem;border-radius:10px;font-size:.85rem;margin-bottom:1rem;text-align:center}

/* ─── MAIN APP ──────────────────────────────────────────────── */
.main-app{max-width:900px;margin:0 auto;padding:2rem 1.5rem}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:3rem;flex-wrap:gap}
.header-left h1{font-size:1.8rem;font-weight:800;letter-spacing:-1px}
.header-left h1 span{color:var(--accent)}
.header-left p{color:var(--muted);font-family:'DM Mono',monospace;font-size:.75rem;margin-top:.2rem}
.header-right{display:flex;align-items:center;gap:1rem;flex-wrap:wrap}

/* COINS */
.coin-badge{background:rgba(249,199,79,.1);border:1px solid rgba(249,199,79,.3);padding:.6rem 1.2rem;border-radius:50px;display:flex;align-items:center;gap:.5rem;font-weight:700;font-size:1rem;color:var(--coin)}
.coin-badge.shake{animation:coinShake .4s ease}
@keyframes coinShake{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}

/* STREAK */
.streak-badge{background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.3);padding:.6rem 1.2rem;border-radius:50px;font-size:.85rem;color:var(--accent2);font-weight:600}

/* LOGOUT */
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--muted);padding:.6rem 1.2rem;border-radius:50px;cursor:pointer;font-family:'Syne',sans-serif;font-size:.8rem;transition:all .2s}
.btn-logout:hover{border-color:var(--high);color:var(--high)}

/* TOAST */
.toast{position:fixed;bottom:2rem;right:2rem;z-index:999;display:flex;flex-direction:column;gap:.5rem;max-width:320px}
.toast-item{background:var(--card);border:1px solid var(--border);padding:1rem 1.2rem;border-radius:14px;font-size:.88rem;line-height:1.4;animation:toastIn .3s ease;box-shadow:0 10px 40px rgba(0,0,0,.4)}
@keyframes toastIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-item.reward{border-color:rgba(200,255,0,.4);color:var(--accent)}
.toast-item.penalty{border-color:rgba(255,71,87,.4);color:var(--high)}
.toast-item.info{border-color:rgba(124,58,237,.4);color:#a78bfa}

/* ADD TASK FORM */
.add-form{background:rgba(22,22,31,.8);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:20px;padding:1.8rem;margin-bottom:2rem}
.add-form h3{font-size:1rem;font-weight:700;margin-bottom:1.2rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;font-family:'DM Mono',monospace;font-size:.75rem}
.form-row{display:grid;grid-template-columns:1fr auto auto;gap:.8rem;align-items:end}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
.form-field{display:flex;flex-direction:column;gap:.4rem}
.form-field label{font-size:.7rem;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:1px}
.form-field input,.form-field select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:.7rem .9rem;border-radius:10px;font-family:'Syne',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;width:100%}
.form-field input:focus,.form-field select:focus{border-color:var(--accent)}
.form-field select option{background:var(--card)}
.btn-add{background:var(--accent);color:#000;border:none;padding:.7rem 1.5rem;border-radius:10px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;white-space:nowrap;transition:all .2s}
.btn-add:hover{box-shadow:0 0 20px rgba(200,255,0,.4);transform:translateY(-1px)}
.cost-hint{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);text-align:center;margin-top:.8rem}
.cost-hint span{color:var(--coin)}

/* FILTER BAR */
.filter-bar{display:flex;gap:.6rem;margin-bottom:1.5rem;flex-wrap:wrap}
.filter-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:.5rem 1.1rem;border-radius:50px;cursor:pointer;font-family:'Syne',sans-serif;font-size:.82rem;font-weight:600;transition:all .2s}
.filter-btn.active,.filter-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(200,255,0,.05)}
.search-wrap{position:relative;margin-bottom:1.2rem}
.search-wrap input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:.75rem 1rem .75rem 2.8rem;border-radius:14px;font-family:'Syne',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent3)}
.search-icon{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1rem}

/* TASKS */
.tasks-list{display:flex;flex-direction:column;gap:.8rem}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--muted)}
.empty-state .big{font-size:3rem;display:block;margin-bottom:1rem}
.empty-state p{font-family:'DM Mono',monospace;font-size:.85rem}

/* TASK CARD */
.task-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.2rem 1.4rem;display:flex;align-items:center;gap:1rem;transition:all .3s;position:relative;overflow:hidden}
.task-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.task-card.high::before{background:var(--high)}
.task-card.medium::before{background:var(--med)}
.task-card.low::before{background:var(--low)}
.task-card:hover{border-color:rgba(200,255,0,.2);transform:translateY(-1px)}
.task-card.done{opacity:.55}
.task-card.done .task-title{text-decoration:line-through;color:var(--muted)}
.task-card.overdue .task-deadline{color:var(--high)!important}
.task-card.due-soon .task-deadline{color:var(--med)!important}

/* CHECKBOX */
.check{width:22px;height:22px;border:2px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;background:transparent}
.check:hover{border-color:var(--accent)}
.check.checked{background:var(--accent);border-color:var(--accent)}
.check.checked::after{content:'✓';color:#000;font-size:.8rem;font-weight:800}

/* TASK INFO */
.task-info{flex:1;min-width:0}
.task-title{font-weight:700;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.3rem}
.task-meta{display:flex;gap:.8rem;align-items:center;flex-wrap:wrap}
.task-deadline{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted)}
.priority-tag{font-size:.65rem;font-weight:700;padding:.2rem .6rem;border-radius:50px;text-transform:uppercase;letter-spacing:1px}
.priority-tag.high{background:rgba(255,71,87,.15);color:var(--high)}
.priority-tag.medium{background:rgba(255,165,2,.15);color:var(--med)}
.priority-tag.low{background:rgba(46,213,115,.15);color:var(--low)}

/* TASK ACTIONS */
.task-actions{display:flex;gap:.5rem;flex-shrink:0}
.btn-icon{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:1rem;transition:all .2s}
.btn-icon:hover.del{border-color:var(--high);color:var(--high);background:rgba(255,71,87,.1)}

/* STATS BAR */
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.2rem;text-align:center}
.stat-val{font-size:1.8rem;font-weight:800;margin-bottom:.3rem}
.stat-val.gold{color:var(--coin)}
.stat-val.green{color:var(--low)}
.stat-val.orange{color:var(--accent2)}
.stat-label{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}

/* LEADERBOARD */
.lb-toggle{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.3);color:#a78bfa;padding:.6rem 1.2rem;border-radius:50px;cursor:pointer;font-family:'Syne',sans-serif;font-size:.82rem;font-weight:600;border:1px solid rgba(124,58,237,.3);transition:all .2s}
.lb-toggle:hover{background:rgba(124,58,237,.2)}
.lb-panel{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:1.5rem;margin-bottom:2rem}
.lb-panel h3{font-size:.75rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:1.2rem}
.lb-row{display:flex;align-items:center;gap:1rem;padding:.7rem 0;border-bottom:1px solid var(--border)}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--muted);width:24px;text-align:center}
.lb-rank.top{color:var(--coin);font-weight:700}
.lb-name{flex:1;font-weight:600;font-size:.9rem}
.lb-coins{font-family:'DM Mono',monospace;font-size:.85rem;color:var(--coin)}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* SPIN LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--muted);font-family:'DM Mono',monospace;font-size:.85rem;gap:.8rem}
.spin{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const {useState, useEffect, useCallback, useRef} = React;

const API = "http://localhost:8000";

// ─── API HELPERS ─────────────────────────────────────────────────────────────
const api = {
  async post(url, body, token) {
    const h = {"Content-Type":"application/json"};
    if(token) h["Authorization"] = `Bearer ${token}`;
    const r = await fetch(API+url, {method:"POST", headers:h, body:JSON.stringify(body)});
    const d = await r.json();
    if(!r.ok) throw new Error(d.detail || "Xato!");
    return d;
  },
  async formPost(url, body) {
    const fd = new URLSearchParams();
    for(const k in body) fd.append(k, body[k]);
    const r = await fetch(API+url, {method:"POST", headers:{"Content-Type":"application/x-www-form-urlencoded"}, body:fd});
    const d = await r.json();
    if(!r.ok) throw new Error(d.detail || "Xato!");
    return d;
  },
  async get(url, token) {
    const h = token ? {"Authorization":`Bearer ${token}`} : {};
    const r = await fetch(API+url, {headers:h});
    const d = await r.json();
    if(!r.ok) throw new Error(d.detail || "Xato!");
    return d;
  },
  async patch(url, body, token) {
    const r = await fetch(API+url, {method:"PATCH", headers:{"Content-Type":"application/json","Authorization":`Bearer ${token}`}, body:JSON.stringify(body)});
    const d = await r.json();
    if(!r.ok) throw new Error(d.detail || "Xato!");
    return d;
  },
  async del(url, token) {
    const r = await fetch(API+url, {method:"DELETE", headers:{"Authorization":`Bearer ${token}`}});
    const d = await r.json();
    if(!r.ok) throw new Error(d.detail || "Xato!");
    return d;
  }
};

// ─── TOAST ───────────────────────────────────────────────────────────────────
function Toast({toasts}) {
  return <div className="toast">
    {toasts.map(t => <div key={t.id} className={`toast-item ${t.type}`}>{t.msg}</div>)}
  </div>;
}

function useToast() {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((msg, type="info") => {
    const id = Date.now();
    setToasts(p => [...p, {id, msg, type}]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3500);
  }, []);
  return {toasts, show};
}

// ─── AUTH PAGE ────────────────────────────────────────────────────────────────
function AuthPage({onLogin}) {
  const [tab, setTab] = useState("login");
  const [form, setForm] = useState({username:"", password:""});
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  const handle = async () => {
    setErr(""); setLoading(true);
    try {
      let d;
      if(tab === "register") {
        d = await api.post("/register", form);
        onLogin({token:d.token, username:d.username, coins:d.coins, streak:0, total_completed:0}, d.message);
      } else {
        d = await api.formPost("/login", {username:form.username, password:form.password});
        onLogin({token:d.access_token, username:d.username, coins:d.coins, streak:d.streak, total_completed:d.total_completed}, `Xush kelibsiz, ${d.username}! 🎯`);
      }
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };

  return <div className="auth-page">
    <div className="auth-box">
      <div className="auth-logo">Task<span>Vault</span></div>
      <div className="auth-sub">// vazifalar.boshqaruvi.tizimi</div>
      <div className="tabs">
        <div className={`tab ${tab==="login"?"active":""}`} onClick={()=>{setTab("login");setErr("")}}>Kirish</div>
        <div className={`tab ${tab==="register"?"active":""}`} onClick={()=>{setTab("register");setErr("")}}>Ro'yxatdan o'tish</div>
      </div>
      {err && <div className="auth-error">⚠ {err}</div>}
      <div className="field">
        <label>Username</label>
        <input placeholder="username kiriting" value={form.username}
          onChange={e=>setForm({...form, username:e.target.value})}
          onKeyDown={e=>e.key==="Enter"&&handle()} />
      </div>
      <div className="field">
        <label>Parol</label>
        <input type="password" placeholder="parol kiriting" value={form.password}
          onChange={e=>setForm({...form, password:e.target.value})}
          onKeyDown={e=>e.key==="Enter"&&handle()} />
      </div>
      {tab==="register" && <div style={{fontSize:".8rem",color:"#a78bfa",marginBottom:"1rem",textAlign:"center",fontFamily:"'DM Mono',monospace"}}>
        🪙 Ro'yxatdan o'tsangiz <b>100 tanga</b> beriladi!
      </div>}
      <button className="btn-main" onClick={handle} disabled={loading}>
        {loading ? "Yuklanmoqda..." : tab==="login" ? "Kirish →" : "Ro'yxatdan o'tish →"}
      </button>
    </div>
  </div>;
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function MainApp({auth, onLogout}) {
  const {token, username} = auth;
  const [coins, setCoins] = useState(auth.coins);
  const [streak, setStreak] = useState(auth.streak);
  const [tasks, setTasks] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [showLB, setShowLB] = useState(false);
  const [lb, setLb] = useState([]);
  const {toasts, show} = useToast();
  const coinRef = useRef(null);

  // New task form
  const [nTitle, setNTitle] = useState("");
  const [nDeadline, setNDeadline] = useState("");
  const [nPriority, setNPriority] = useState("medium");

  useEffect(() => { loadTasks(); }, []);

  const loadTasks = async () => {
    setLoading(true);
    try { setTasks(await api.get("/tasks", token)); }
    catch(e) { show("Vazifalar yuklanmadi: "+e.message, "penalty"); }
    setLoading(false);
  };

  const coinAnim = () => {
    if(coinRef.current) {
      coinRef.current.classList.remove("shake");
      void coinRef.current.offsetWidth;
      coinRef.current.classList.add("shake");
    }
  };

  const addTask = async () => {
    if(!nTitle.trim()) { show("Vazifa nomini kiriting!", "penalty"); return; }
    try {
      const d = await api.post("/tasks", {title:nTitle, deadline:nDeadline||null, priority:nPriority}, token);
      setTasks(p => [d.task, ...p]);
      setCoins(d.coins); coinAnim();
      show(d.message, "penalty");
      setNTitle(""); setNDeadline(""); setNPriority("medium");
    } catch(e) { show(e.message, "penalty"); }
  };

  const toggleTask = async (task) => {
    try {
      const d = await api.patch(`/tasks/${task.id}`, {completed:!task.completed}, token);
      setTasks(p => p.map(t => t.id===task.id ? d.task : t));
      setCoins(d.coins); setStreak(d.streak); coinAnim();
      show(d.message, task.completed ? "penalty" : "reward");
    } catch(e) { show(e.message, "penalty"); }
  };

  const deleteTask = async (id) => {
    try {
      const d = await api.del(`/tasks/${id}`, token);
      setTasks(p => p.filter(t => t.id!==id));
      setCoins(d.coins); coinAnim();
      show(d.message, "penalty");
    } catch(e) { show(e.message, "penalty"); }
  };

  const loadLB = async () => {
    if(!showLB) {
      try { setLb(await api.get("/leaderboard", token)); }
      catch(e) {}
    }
    setShowLB(p => !p);
  };

  const getDeadlineStatus = (deadline, completed) => {
    if(!deadline || completed) return "";
    const today = new Date().toISOString().split("T")[0];
    const diff = (new Date(deadline) - new Date(today)) / 86400000;
    if(diff < 0) return "overdue";
    if(diff <= 2) return "due-soon";
    return "";
  };

  const today = new Date().toISOString().split("T")[0];

  const filtered = tasks.filter(t => {
    const matchFilter = filter==="all" || (filter==="active"&&!t.completed) || (filter==="done"&&t.completed) || (filter==="overdue"&&!t.completed&&t.deadline&&t.deadline<today);
    const matchSearch = t.title.toLowerCase().includes(search.toLowerCase());
    return matchFilter && matchSearch;
  });

  const completedCount = tasks.filter(t=>t.completed).length;

  return <div className="app">
    <Toast toasts={toasts}/>
    <div className="main-app">

      {/* HEADER */}
      <div className="header">
        <div className="header-left">
          <h1>Task<span>Vault</span></h1>
          <p>// {username} hisob paneli</p>
        </div>
        <div className="header-right">
          <div ref={coinRef} className="coin-badge">🪙 {coins}</div>
          {streak>0 && <div className="streak-badge">🔥 {streak} streak</div>}
          <button className="lb-toggle" onClick={loadLB}>🏆 Reyting</button>
          <button className="btn-logout" onClick={onLogout}>Chiqish</button>
        </div>
      </div>

      {/* STATS */}
      <div className="stats-bar">
        <div className="stat-card">
          <div className="stat-val gold">{coins}</div>
          <div className="stat-label">🪙 Tangalar</div>
        </div>
        <div className="stat-card">
          <div className="stat-val green">{completedCount}</div>
          <div className="stat-label">✅ Bajarilgan</div>
        </div>
        <div className="stat-card">
          <div className="stat-val orange">{tasks.length - completedCount}</div>
          <div className="stat-label">⏳ Qolgan</div>
        </div>
      </div>

      {/* LEADERBOARD */}
      {showLB && <div className="lb-panel">
        <h3>🏆 eng boy foydalanuvchilar</h3>
        {lb.map((u,i) => <div key={u.username} className="lb-row">
          <div className={`lb-rank ${i<3?"top":""}`}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</div>
          <div className="lb-name">{u.username} {u.username===username?"(siz)":""}</div>
          <div className="lb-coins">🪙 {u.coins}</div>
        </div>)}
      </div>}

      {/* ADD FORM */}
      <div className="add-form">
        <h3>// yangi vazifa qo'shish</h3>
        <div className="form-row">
          <div className="form-field" style={{gridColumn:"1"}}>
            <label>Vazifa nomi</label>
            <input placeholder="Vazifani kiriting..." value={nTitle}
              onChange={e=>setNTitle(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&addTask()} />
          </div>
          <div className="form-field">
            <label>Deadline</label>
            <input type="date" value={nDeadline} min={today}
              onChange={e=>setNDeadline(e.target.value)} />
          </div>
          <div className="form-field">
            <label>Muhimlik</label>
            <select value={nPriority} onChange={e=>setNPriority(e.target.value)}>
              <option value="high">🔴 Yuqori</option>
              <option value="medium">🟡 O'rta</option>
              <option value="low">🟢 Past</option>
            </select>
          </div>
        </div>
        <div style={{marginTop:".8rem",display:"flex",gap:".8rem",alignItems:"center",flexWrap:"wrap"}}>
          <button className="btn-add" onClick={addTask}>+ Qo'shish</button>
          <span className="cost-hint">Har bir vazifa: <span>-5 🪙</span> · Vaqtida bajarish: <span>+20 🪙</span> · Kechikish: <span>-10 🪙</span></span>
        </div>
      </div>

      {/* SEARCH */}
      <div className="search-wrap">
        <span className="search-icon">🔍</span>
        <input placeholder="Vazifa qidirish..." value={search} onChange={e=>setSearch(e.target.value)} />
      </div>

      {/* FILTERS */}
      <div className="filter-bar">
        {[["all","Barchasi"],["active","Aktiv"],["done","Bajarilgan"],["overdue","Muddati o'tgan"]].map(([v,l]) =>
          <button key={v} className={`filter-btn ${filter===v?"active":""}`} onClick={()=>setFilter(v)}>{l}</button>
        )}
      </div>

      {/* TASKS */}
      {loading ? <div className="loading"><div className="spin"/><span>Yuklanmoqda...</span></div>
      : filtered.length === 0 ? <div className="empty-state">
          <span className="big">{search?"🔍":"📭"}</span>
          <p>{search ? "Hech narsa topilmadi" : "Vazifalar yo'q. Yangi qo'shing! 🚀"}</p>
        </div>
      : <div className="tasks-list">
          {filtered.map(task => {
            const ds = getDeadlineStatus(task.deadline, task.completed);
            return <div key={task.id} className={`task-card ${task.priority} ${task.completed?"done":""} ${ds}`}>
              <div className={`check ${task.completed?"checked":""}`} onClick={()=>toggleTask(task)} />
              <div className="task-info">
                <div className="task-title">{task.title}</div>
                <div className="task-meta">
                  {task.deadline && <span className="task-deadline">
                    {ds==="overdue"?"⚠":ds==="due-soon"?"⏰":"📅"} {task.deadline}
                    {ds==="overdue" && " — Muddati o'tdi!"}
                  </span>}
                  <span className={`priority-tag ${task.priority}`}>
                    {task.priority==="high"?"Yuqori":task.priority==="medium"?"O'rta":"Past"}
                  </span>
                </div>
              </div>
              <div className="task-actions">
                <button className="btn-icon del" onClick={()=>deleteTask(task.id)} title="O'chirish (−3🪙)">🗑</button>
              </div>
            </div>;
          })}
        </div>}
    </div>
  </div>;
}

// ─── ROOT ────────────────────────────────────────────────────────────────────
function App() {
  const [auth, setAuth] = useState(() => {
    try { return JSON.parse(localStorage.getItem("tv_auth")||"null"); } catch{ return null; }
  });
  const {toasts, show} = useToast();

  const handleLogin = (data, msg) => {
    localStorage.setItem("tv_auth", JSON.stringify(data));
    setAuth(data);
    show(msg, "reward");
  };

  const handleLogout = () => {
    localStorage.removeItem("tv_auth");
    setAuth(null);
  };

  if(!auth) return <>
    <Toast toasts={toasts}/>
    <AuthPage onLogin={handleLogin}/>
  </>;

  return <MainApp auth={auth} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<div id="pwa-banner" style="display:none;position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:9999;align-items:center;gap:1rem;background:#16161f;border:1px solid #c8ff00;border-radius:16px;padding:1rem 1.4rem;box-shadow:0 0 40px rgba(200,255,0,.2);max-width:340px;width:90%">
  <img src="icon-192.png" style="width:40px;height:40px;border-radius:10px"/>
  <div style="flex:1">
    <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;color:#e8e8f0">TaskVault</div>
    <div style="font-family:'DM Mono',monospace;font-size:.7rem;color:#6b6b80">Telefoningizga o'rnating!</div>
  </div>
  <button id="pwa-install" style="background:#c8ff00;color:#000;border:none;padding:.5rem 1rem;border-radius:10px;font-family:'Syne',sans-serif;font-weight:800;cursor:pointer;font-size:.85rem">O'rnatish</button>
  <button id="pwa-close" style="background:transparent;border:none;color:#6b6b80;cursor:pointer;font-size:1.2rem;padding:.2rem">✕</button>
</div>

<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js")
      .then(r=>console.log("SW tayyor:",r.scope))
      .catch(e=>console.log("SW xato:",e));
  });
}
let deferredPrompt;
const banner=document.getElementById("pwa-banner");
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault(); deferredPrompt=e;
  banner.style.display="flex";
});
document.getElementById("pwa-install").addEventListener("click",async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt=null; banner.style.display="none";
});
document.getElementById("pwa-close").addEventListener("click",()=>{ banner.style.display="none"; });
window.addEventListener("appinstalled",()=>{ banner.style.display="none"; });
</script>
</body>
